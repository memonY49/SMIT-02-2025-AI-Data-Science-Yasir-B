<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saylani SMIT Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
      .saylani-green { color: #00a651; }
      .bg-saylani-green { background-color: #00a651; }
      .border-saylani-green { border-color: #00a651; }
      .focus-ring-saylani:focus { border-color: #00a651; box-shadow: 0 0 0 2px rgba(0, 166, 81, 0.1); }
      
      /* Markdown-like styling for vanilla JS */
      .chat-text p { margin-bottom: 0.75rem; }
      .chat-text p:last-child { margin-bottom: 0; }
      .chat-text ul { list-style-type: disc; margin-left: 1.25rem; margin-bottom: 0.75rem; }
      .chat-text li { margin-bottom: 0.25rem; }
      .chat-text strong { font-weight: 700; }
    </style>
  </head>
  <body class="bg-gray-50 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white shadow-md bg-saylani-green">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </div>
        <div>
          <h1 class="font-bold text-lg tracking-tight">Saylani SMIT Assistant</h1>
          <div class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-xs text-gray-500 font-medium uppercase tracking-wider">Online</span>
          </div>
        </div>
      </div>
      <button id="clear-chat" class="p-2 text-gray-400 hover:text-red-500 transition-colors rounded-full hover:bg-red-50" title="Clear Chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
      </button>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scrollbar-thin">
      <div class="max-w-3xl mx-auto space-y-6" id="messages-list">
        <!-- Welcome Message -->
        <div class="flex justify-start">
          <div class="flex gap-3 max-w-[85%] flex-row">
            <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center shadow-sm bg-saylani-green text-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            </div>
            <div class="rounded-2xl px-4 py-3 shadow-sm bg-white text-gray-800 border border-gray-100 rounded-tl-none">
              <div class="chat-text text-sm leading-relaxed">
                Assalam-o-Alaikum! Welcome to Saylani SMIT Assistant. How can I help you today with your IT journey?
              </div>
              <div class="text-[10px] mt-2 opacity-50 text-left welcome-time"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-200 p-4 md:p-6">
      <div class="max-w-3xl mx-auto space-y-4">
        <!-- Quick Questions -->
        <div id="quick-questions" class="flex flex-wrap gap-2">
          <button class="quick-btn flex items-center gap-2 px-3 py-1.5 bg-white border border-gray-200 rounded-full text-xs font-medium text-gray-600 hover:border-green-500 hover:text-green-600 transition-all shadow-sm" data-query="What courses does SMIT offer?">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
            What courses does SMIT offer?
          </button>
          <button class="quick-btn flex items-center gap-2 px-3 py-1.5 bg-white border border-gray-200 rounded-full text-xs font-medium text-gray-600 hover:border-green-500 hover:text-green-600 transition-all shadow-sm" data-query="How can I apply for SMIT?">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            How can I apply for SMIT?
          </button>
        </div>

        <form id="chat-form" class="relative flex items-center">
          <input
            id="chat-input"
            type="text"
            placeholder="Ask about SMIT courses, admissions, or locations..."
            class="w-full bg-gray-50 border border-gray-200 rounded-2xl pl-4 pr-14 py-4 focus:outline-none focus-ring-saylani transition-all text-sm"
          />
          <button
            type="submit"
            id="send-btn"
            class="absolute right-2 p-2.5 rounded-xl transition-all text-white shadow-lg bg-saylani-green"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </form>
        <p class="text-[10px] text-center text-gray-400 font-medium uppercase tracking-widest">
          Saylani Welfare International Trust • SMIT Assistant
        </p>
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
