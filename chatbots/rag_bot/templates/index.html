<!DOCTYPE html>
<html>
<head>
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>
                <span>📄</span>
                RAG AI Chatbot
            </h2>
            <p>Ask me anything about your documents</p>
        </div>
        
        <div id="chatbox">
            <div class="welcome-message">
                <h3>👋 Welcome!</h3>
                <p>Start a conversation by asking a question below</p>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="msg" placeholder="Type your message here..." onkeypress="if(event.key === 'Enter') send()" />
            <button onclick="send()">
                <span>Send</span>
            </button>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
